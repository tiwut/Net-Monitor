<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network & Speed Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-8 font-sans">
    <div class="max-w-6xl mx-auto">
        
        <header class="mb-8 flex justify-between items-center border-b border-gray-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-indigo-400">Network Monitor</h1>
                <p class="text-gray-400 text-sm mt-1">Live Latency & Automated Speedtests</p>
            </div>
            <div>
                <button id="btn-speedtest" onclick="forceSpeedtest()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center">
                    <span id="btn-text">Force Speedtest Now</span>
                </button>
            </div>
        </header>

        <h2 class="text-xl font-semibold mb-4 text-gray-200">Live Target Latency</h2>
        <div id="ping-container" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg flex flex-col justify-center">
                <h2 class="text-lg font-semibold mb-4 text-gray-400">Latest Speedtest</h2>
                <div class="mb-4">
                    <p class="text-sm text-gray-500 uppercase">Download</p>
                    <p id="latest-down" class="text-3xl font-bold text-emerald-400">0.0 <span class="text-lg text-emerald-600">Mbps</span></p>
                </div>
                <div class="mb-4">
                    <p class="text-sm text-gray-500 uppercase">Upload</p>
                    <p id="latest-up" class="text-3xl font-bold text-purple-400">0.0 <span class="text-lg text-purple-600">Mbps</span></p>
                </div>
                <div>
                    <p class="text-sm text-gray-500 uppercase">Latency</p>
                    <p id="latest-ping" class="text-xl font-bold text-blue-400">0.0 <span class="text-sm text-blue-600">ms</span></p>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg lg:col-span-2">
                <canvas id="speedChart" height="100"></canvas>
            </div>
        </div>
    </div>

    <script>
        let speedChart;

        function initChart() {
            const ctx = document.getElementById('speedChart').getContext('2d');
            speedChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'Download (Mbps)', data: [], borderColor: '#34d399', backgroundColor: 'rgba(52, 211, 153, 0.1)', fill: true, tension: 0.4 },
                        { label: 'Upload (Mbps)', data: [], borderColor: '#a78bfa', backgroundColor: 'rgba(167, 139, 250, 0.1)', fill: true, tension: 0.4 }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#e5e7eb' } } },
                    scales: {
                        y: { grid: { color: '#374151' }, ticks: { color: '#9ca3af' } },
                        x: { grid: { color: '#374151' }, ticks: { color: '#9ca3af' } }
                    }
                }
            });
        }

        function updatePingUI(pings) {
            const container = document.getElementById('ping-container');
            container.innerHTML = '';
            
            pings.forEach(p => {
                const statusColor = p.online ? 'bg-emerald-500' : 'bg-red-500';
                const statusText = p.online ? 'Online' : 'Offline';
                const msText = p.online ? `${p.ms.toFixed(1)} ms` : 'Timeout';

                container.innerHTML += `
                    <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg flex justify-between items-center">
                        <div>
                            <p class="text-lg font-bold text-gray-200">${p.name}</p>
                            <p class="text-xs text-gray-500 font-mono">${p.ip}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-bold ${p.online ? 'text-blue-400' : 'text-red-400'}">${msText}</p>
                            <p class="text-xs text-gray-400 flex items-center justify-end mt-1">
                                <span class="w-2 h-2 rounded-full ${statusColor} mr-1 animate-pulse"></span> ${statusText}
                            </p>
                        </div>
                    </div>
                `;
            });
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                updatePingUI(data.pings);

                const btn = document.getElementById('btn-speedtest');
                const btnText = document.getElementById('btn-text');
                if (data.speedtest_running) {
                    btn.classList.add('opacity-50', 'cursor-not-allowed', 'animate-pulse');
                    btnText.innerText = 'Testing Connection... (Takes ~30s)';
                } else {
                    btn.classList.remove('opacity-50', 'cursor-not-allowed', 'animate-pulse');
                    btnText.innerText = 'Force Speedtest Now';
                }

                if (data.speedtests.length > 0) {
                    const latest = data.speedtests[data.speedtests.length - 1];
                    document.getElementById('latest-down').innerHTML = `${latest.down.toFixed(1)} <span class="text-lg text-emerald-600">Mbps</span>`;
                    document.getElementById('latest-up').innerHTML = `${latest.up.toFixed(1)} <span class="text-lg text-purple-600">Mbps</span>`;
                    document.getElementById('latest-ping').innerHTML = `${latest.ping.toFixed(1)} <span class="text-sm text-blue-600">ms</span>`;

                    speedChart.data.labels = data.speedtests.map(s => s.time);
                    speedChart.data.datasets[0].data = data.speedtests.map(s => s.down);
                    speedChart.data.datasets[1].data = data.speedtests.map(s => s.up);
                    speedChart.update();
                }

            } catch (err) { console.error("Error fetching status", err); }
        }

        async function forceSpeedtest() {
            await fetch('/api/force-speedtest', { method: 'POST' });
            fetchStatus();
        }

        initChart();
        fetchStatus();
        setInterval(fetchStatus, 3000);
    </script>
</body>
</html>
